<div class="container">
    <br>
    <div class="row mb-3 align-items-center">
        <div class="col-12 d-flex align-items-center gap-3">
            <a routerLink="/panel/compras" class="btn btn-outline-secondary d-inline-flex align-items-center justify-content-center" style="width: 40px; height: 40px; border-radius: 50%;">
                <i class="fa-solid fa-arrow-left" style="font-size: 1.25rem;"></i>
            </a>
            <h5 class="mb-0">Registrar Compra</h5>
        </div>
    </div>
    <div class="row">
        <div class="col-5">
            <ng-select [items]="proveedores"
                            bindLabel="nombre"
                            bindValue="id"
                            [(ngModel)]="idProveedor"
                            placeholder="Buscar Proveedor"
                            class="" 
                            [appendTo]="'body'"
                            [virtualScroll]="true"
                            [searchable]="true"
                            [searchFn]="customSearch">
                    <ng-template ng-option-tmp let-item="item">
                        <div class="d-flex justify-content-between">
                        <span>{{ item?.nombre }}</span>
                        </div>
                    </ng-template>
                    </ng-select>
        </div>
        <div class="col-5">
            <input type="text" class="form-control" placeholder="Folio Proveedor (Opcional)" [(ngModel)]="folio_proveedor" style="height: 38px;">
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col-5">
            <ng-select [items]="productos"
                        bindLabel="nombre"
                        bindValue="id"
                        placeholder="Buscar Producto"
                        class="" 
                        [appendTo]="'body'"
                        [virtualScroll]="true"
                        [searchable]="true"
                        [searchFn]="customSearch"
                        [(ngModel)]="idProducto">
                        <ng-template ng-option-tmp let-item="item">
                        <div class="d-flex justify-content-between">
                            <span>{{ item?.nombre }} <small class="text-muted">({{ item?.unidad_medida }})</small></span>
                            <small class="text-muted">{{ item?.codigo || 'N/A' }}</small>
                        </div>
                        </ng-template>
                    </ng-select>
        </div>
        <div class="col-2">
            <button class="btn btn-primary w-100" (click)="agregarProducto()">Agregar</button>
        </div>
    </div>
    <br>
        <div class="row">
                    <div class="col-9">
                        <table  mat-table [dataSource]="dataSource">
                             <ng-container matColumnDef="producto">
                                 <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 20%;"> Nombre </th>
                                 <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
                             </ng-container>
                             <ng-container matColumnDef="codigo">
                                 <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 20%;"> Código </th>
                                 <td mat-cell *matCellDef="let element"> {{element.codigo}} </td>
                             </ng-container>
                             <ng-container matColumnDef="cantidad">
                                 <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 10%; text-align: right;"> Cantidad </th>
                                 <td mat-cell *matCellDef="let element" style="padding-right: 0; padding-left: 0;"><input [(ngModel)]="element.cantidad" type="number" step="any" class="input-cantidad" (change)="calcularTotales(element)"/> </td>
                             </ng-container>
                             <ng-container matColumnDef="unidad_medida">
                                 <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 8%; text-align: center;"> Medida </th>
                                 <td mat-cell *matCellDef="let element" style="text-align: center;" class="fw-semibold text-secondary"> {{element.unidad_medida}} </td>
                             </ng-container>
                             <ng-container matColumnDef="precio">
                                 <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 10%; text-align: right;"> Precio </th>
                                <td mat-cell *matCellDef="let element" style="padding-right: 0; padding-left: 0;"><input [(ngModel)]="element.precio" type="number" step="any" class="input-cantidad" (change)="calcularTotales(element)"/> </td>
                            </ng-container>
                            <ng-container matColumnDef="iva">
                                <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 10%; text-align: center;"> IVA(%) </th>
                                <td mat-cell *matCellDef="let element" style="text-align: center;"><input [(ngModel)]="element.iva" type="number" step="any" class="input-cantidad" (change)="calcularTotales(element)"/> </td>
                            </ng-container>

                            <ng-container matColumnDef="subtotal">
                                <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 15%; text-align: right;"> Subtotal </th>
                                <td mat-cell *matCellDef="let element" style="text-align: right; padding-left: 0;"> {{element.subtotal | currency}} </td>
                            </ng-container>
                            <ng-container matColumnDef="total">
                                <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 15%; text-align: right;"> Total </th>
                                <td mat-cell *matCellDef="let element" style="padding-right: 0; padding-left: 0;"><input [(ngModel)]="element.total" type="number" step="any" class="input-cantidad" (change)="calcularInverso(element)"/> </td>
                            </ng-container>
                            <ng-container matColumnDef="eliminar">
                                <th mat-header-cell *matHeaderCellDef class="th-table" style="width: 6%; text-align: center;"> </th>
                                <td mat-cell *matCellDef="let element; let i = index" style="text-align: center;">
                                    <a style="cursor: pointer;" (click)="eliminarProducto(i)">
                                        <i style="color: red; font-size: 18px;" class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </ng-container>
            
                            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            
                        </table>
            
                    </div>
                    <div class="col-3">
                        <h6 style="text-align: right;">Subtotal: </h6>
                        <input style="text-align: right;" type="text" [ngModel]="subtotal | currency" readonly class="form-control">
                        <br>
                        <h6 style="text-align: right;">IVA: </h6>
                        <input style="text-align: right;" type="text" [ngModel]="iva | currency" readonly class="form-control">
                        <br>
                        <h6 style="text-align: right;">Total: </h6>
                        <input style="text-align: right;" type="text" [ngModel]="total | currency" readonly class="form-control">
                        <br>
                        <button class="btn btn-primary w-100" (click)="guardarCompra()">Guardar</button>
                    </div>
        </div>
</div>
